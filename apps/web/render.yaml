services:
  - type: web
    name: symphony-ecommerce
    runtime: node
    plan: free
    buildCommand: pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=256
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://symphonyenterprise.co.in
      - key: ADMIN_EMAIL
        value: info@symphonyenterprise.co.in
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Admin
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: us-east-1
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        value: info@symphonyenterprise.co.in
      - key: BREVO_SENDER_NAME
        value: Symphony Enterprise
      - key: ADMIN_EMAIL
        value: info@symphonyenterprise.co.in
      - key: NEXT_PUBLIC_GA_ID
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://ozuoxykvcfeeylszacoj.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
  - type: cron
    name: symphony-ping
    runtime: node
    plan: free
    schedule: "*/5 * * * *"
    startCommand: node ping.js
    envVars:
      - key: NODE_ENV
        value: production
