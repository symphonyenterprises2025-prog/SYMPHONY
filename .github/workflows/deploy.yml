name: Deploy to EC2
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/SYMPHONY
            git fetch origin main
            git reset --hard origin/main
            pnpm install --no-frozen-lockfile
            # Restore prisma .env (gitignored, overwritten by reset)
            printf 'DATABASE_URL="postgresql://symphony:symphony-pw-2026@localhost:5432/symphony"\n' > prisma/.env
            cd prisma
            npx prisma generate
            npx prisma migrate deploy
            cd ../apps/web
            # Allocate swap to prevent OOM during build on t2.small (2 GB RAM)
            sudo fallocate -l 2G /swapfile 2>/dev/null || true
            sudo chmod 600 /swapfile 2>/dev/null || true
            sudo mkswap /swapfile 2>/dev/null || true
            sudo swapon /swapfile 2>/dev/null || true
            pnpm build
            sudo swapoff /swapfile 2>/dev/null || true
            sudo rm -f /swapfile 2>/dev/null || true
            cd ../..
            pm2 restart symphony
